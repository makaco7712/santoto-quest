<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SANTOTO QUEST — Sé tu mejor versión</title>
  <style>
    html, body {
      margin: 0; padding: 0; background: #0a1128; height: 100%;
      overflow: hidden;
    }
    /* el contenedor llena la ventana: Phaser (Scale.FIT) escala el juego
       al máximo tamaño posible manteniendo la proporción */
    #game {
      width: 100vw;
      height: 100vh;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }
    canvas { image-rendering: pixelated; }
  </style>
</head>
<body>
  <div id="game"></div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
